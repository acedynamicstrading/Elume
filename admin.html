<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉLUME — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e;
  --gold-light: #e8d5a3;
  --gold-dim: rgba(201,169,110,0.18);
  --cream: #faf6f0;
  --ink: #0f0d0a;
  --ink-mid: #1e1a14;
  --ink-soft: #2e2620;
  --muted: rgba(250,246,240,0.4);
  --border: rgba(201,169,110,0.18);
  --green: #4caf82;
  --amber: #e0a050;
  --red: #d95c5c;
  --blue: #6a9fd8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-font-smoothing:antialiased;}
body{font-family:'Jost',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;overflow-x:hidden;}

/* ── GRAIN OVERLAY ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* ── LOGIN PAGE ── */
#login-page{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,169,110,0.07) 0%, transparent 70%);
}
.login-card{
  width:100%;max-width:400px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.025);
  backdrop-filter:blur(12px);
  padding:48px 40px;
  animation:fadeUp 0.5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
.login-logo{
  font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;
  letter-spacing:0.35em;text-align:center;margin-bottom:6px;
}
.login-logo span{color:var(--gold);}
.login-sub{
  text-align:center;font-size:0.58rem;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(201,169,110,0.5);margin-bottom:40px;
}
.field-group{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
.field input{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--cream);font-family:'Jost',sans-serif;font-size:0.85rem;
  padding:12px 16px;outline:none;transition:border-color 0.2s;
}
.field input:focus{border-color:var(--gold);}
.login-btn{
  width:100%;padding:14px;background:var(--gold);color:var(--ink);
  border:none;cursor:pointer;font-family:'Jost',sans-serif;
  font-size:0.7rem;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;
}
.login-btn:hover{background:var(--gold-light);}
.login-btn:disabled{opacity:0.4;pointer-events:none;}
.spin{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
.login-btn.loading .spin{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
.login-err{
  margin-top:14px;padding:10px 14px;
  background:rgba(217,92,92,0.1);border:1px solid rgba(217,92,92,0.25);
  font-size:0.72rem;color:#e07070;text-align:center;display:none;
}

/* ── DASHBOARD ── */
#dashboard{display:none;}

.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 32px;
  background:rgba(15,13,10,0.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:0.3em;}
.topbar-logo span{color:var(--gold);}
.topbar-tag{font-size:0.55rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(201,169,110,0.45);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-user{font-size:0.65rem;color:var(--muted);letter-spacing:0.06em;}
.logout-btn{
  padding:6px 16px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:'Jost',sans-serif;font-size:0.6rem;
  letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;
}
.logout-btn:hover{border-color:var(--gold);color:var(--gold);}

.main{padding:88px 32px 60px;max-width:1200px;margin:0 auto;}

/* ── STAT CARDS ── */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;margin-bottom:32px;
}
.stat-card{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  padding:20px;position:relative;overflow:hidden;
  animation:fadeUp 0.4s ease both;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, var(--gold), transparent);
}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--gold);line-height:1;}
.stat-label{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:6px;}

/* ── SECTION HEAD ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;}
.section-actions{display:flex;gap:8px;}

/* ── BUTTONS ── */
.btn{
  padding:8px 18px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:'Jost',sans-serif;font-size:0.62rem;
  letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn.primary{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.btn.primary:hover{background:var(--gold-light);}
.btn.danger{border-color:rgba(217,92,92,0.3);color:#d95c5c;}
.btn.danger:hover{background:rgba(217,92,92,0.1);}
.btn.success{border-color:rgba(76,175,130,0.3);color:var(--green);}
.btn.success:hover{background:rgba(76,175,130,0.08);}
.btn:disabled{opacity:0.35;pointer-events:none;}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);}
.ftab{
  flex:1;padding:10px;text-align:center;cursor:pointer;
  font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--muted);background:transparent;border:none;
  border-right:1px solid var(--border);transition:all 0.2s;
}
.ftab:last-child{border-right:none;}
.ftab.active{background:var(--gold-dim);color:var(--gold);}
.ftab:hover:not(.active){color:rgba(250,246,240,0.7);}

/* ── SALON TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{
  padding:10px 14px;font-size:0.57rem;letter-spacing:0.18em;
  text-transform:uppercase;color:rgba(201,169,110,0.5);
  text-align:left;font-weight:400;white-space:nowrap;
}
tbody tr{
  border-bottom:1px solid rgba(201,169,110,0.06);
  transition:background 0.15s;
}
tbody tr:hover{background:rgba(255,255,255,0.02);}
td{padding:14px;font-size:0.78rem;color:rgba(250,246,240,0.75);vertical-align:middle;}
td.name{color:var(--cream);font-weight:400;}

.badge{
  display:inline-block;padding:3px 10px;font-size:0.55rem;
  letter-spacing:0.12em;text-transform:uppercase;border-radius:2px;
}
.badge.active  {background:rgba(76,175,130,0.12);color:var(--green);border:1px solid rgba(76,175,130,0.25);}
.badge.pending {background:rgba(224,160,80,0.12);color:var(--amber);border:1px solid rgba(224,160,80,0.25);}
.badge.suspended{background:rgba(217,92,92,0.12);color:var(--red);border:1px solid rgba(217,92,92,0.25);}

.usage-bar-wrap{width:80px;}
.usage-bar-outer{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.usage-bar-inner{height:100%;background:var(--gold);border-radius:2px;transition:width 0.3s;}
.usage-label{font-size:0.6rem;color:var(--muted);margin-top:3px;}

.td-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;
  z-index:500;padding:24px;display:none;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--ink-mid);border:1px solid var(--border);
  width:100%;max-width:480px;padding:32px;
  animation:fadeUp 0.25s ease;position:relative;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;font-size:1.3rem;
  margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);
}
.modal-close{
  position:absolute;top:16px;right:16px;background:none;border:none;
  color:var(--muted);cursor:pointer;font-size:1.2rem;line-height:1;
  transition:color 0.2s;
}
.modal-close:hover{color:var(--cream);}
.modal-fields{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-err{
  padding:8px 12px;background:rgba(217,92,92,0.1);border:1px solid rgba(217,92,92,0.2);
  font-size:0.72rem;color:#e07070;margin-bottom:12px;display:none;
}
.modal-ok{
  padding:8px 12px;background:rgba(76,175,130,0.1);border:1px solid rgba(76,175,130,0.2);
  font-size:0.72rem;color:var(--green);margin-bottom:12px;display:none;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:600;
  padding:12px 20px;background:var(--ink-soft);border:1px solid var(--border);
  font-size:0.72rem;letter-spacing:0.06em;
  transform:translateY(80px);opacity:0;
  transition:all 0.3s;pointer-events:none;
}
.toast.show{transform:none;opacity:1;}
.toast.green{border-color:rgba(76,175,130,0.4);color:var(--green);}
.toast.red{border-color:rgba(217,92,92,0.4);color:#e07070;}

/* ── EMPTY STATE ── */
.empty{
  padding:60px 24px;text-align:center;
  color:var(--muted);font-size:0.75rem;letter-spacing:0.06em;
}

@media(max-width:768px){
  .topbar{padding:12px 16px;}
  .main{padding:76px 16px 60px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  td,th{padding:10px 8px;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════ -->
<!-- LOGIN                                       -->
<!-- ══════════════════════════════════════════ -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">ÉL<span>U</span>ME</div>
    <div class="login-sub">Admin Portal</div>
    <div class="field-group">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@yoursalon.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <span class="spin"></span>Sign In
    </button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════ -->
<!-- DASHBOARD                                   -->
<!-- ══════════════════════════════════════════ -->
<div id="dashboard">

  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="topbar-logo">ÉL<span>U</span>ME</div>
      <div class="topbar-tag">Admin Dashboard</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="main">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card" style="animation-delay:0s">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-label">Total Salons</div>
      </div>
      <div class="stat-card" style="animation-delay:0.05s">
        <div class="stat-val" id="stat-active" style="color:var(--green)">—</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card" style="animation-delay:0.1s">
        <div class="stat-val" id="stat-pending" style="color:var(--amber)">—</div>
        <div class="stat-label">Pending Approval</div>
      </div>
      <div class="stat-card" style="animation-delay:0.15s">
        <div class="stat-val" id="stat-suspended" style="color:var(--red)">—</div>
        <div class="stat-label">Suspended</div>
      </div>
      <div class="stat-card" style="animation-delay:0.2s">
        <div class="stat-val" id="stat-usage">—</div>
        <div class="stat-label">Requests This Month</div>
      </div>
    </div>

    <!-- Salons section -->
    <div class="section-head">
      <div class="section-title">Salon Accounts</div>
      <div class="section-actions">
        <button class="btn" onclick="loadSalons()">↺ Refresh</button>
        <button class="btn primary" onclick="openCreateModal()">+ Add Salon</button>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="ftab active" data-filter="all"       onclick="setFilter('all',this)">All</button>
      <button class="ftab"        data-filter="pending"   onclick="setFilter('pending',this)">Pending</button>
      <button class="ftab"        data-filter="active"    onclick="setFilter('active',this)">Active</button>
      <button class="ftab"        data-filter="suspended" onclick="setFilter('suspended',this)">Suspended</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Salon</th>
            <th>Owner</th>
            <th>Email</th>
            <th>City</th>
            <th>Status</th>
            <th>Usage / Month</th>
            <th>Last Login</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="salon-tbody"></tbody>
      </table>
      <div class="empty" id="salon-empty" style="display:none;">No salons found.</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════ -->
<!-- CREATE SALON MODAL                          -->
<!-- ══════════════════════════════════════════ -->
<div class="modal-bg" id="create-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('create-modal')">✕</button>
    <div class="modal-title">Add New Salon</div>
    <div class="modal-err" id="create-err"></div>
    <div class="modal-ok"  id="create-ok"></div>
    <div class="modal-fields">
      <div class="field"><label>Salon Name *</label><input type="text"     id="c-name"  placeholder="Prestige Hair Studio"></div>
      <div class="field"><label>Owner Name *</label><input type="text"     id="c-owner" placeholder="Jane Smith"></div>
      <div class="field"><label>Email *</label>     <input type="email"    id="c-email" placeholder="jane@salonname.com"></div>
      <div class="field"><label>Phone</label>       <input type="text"     id="c-phone" placeholder="+94 77 000 0000"></div>
      <div class="field"><label>City</label>        <input type="text"     id="c-city"  placeholder="Colombo"></div>
      <div class="field"><label>Password *</label>  <input type="password" id="c-pass"  placeholder="Temporary password"></div>
      <div class="field">
        <label>Monthly Limit (0 = unlimited)</label>
        <input type="number" id="c-limit" value="500" min="0">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="c-status" style="background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--cream);font-family:'Jost',sans-serif;font-size:0.82rem;padding:10px 14px;outline:none;">
          <option value="true">Active (approved immediately)</option>
          <option value="false">Pending (requires approval)</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn primary" id="create-btn" onclick="doCreateSalon()">Create Salon</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════ -->
<!-- SET LIMIT MODAL                             -->
<!-- ══════════════════════════════════════════ -->
<div class="modal-bg" id="limit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('limit-modal')">✕</button>
    <div class="modal-title">Set Monthly Limit</div>
    <div class="modal-err" id="limit-err"></div>
    <div class="modal-fields">
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;" id="limit-salon-name"></div>
      <div class="field">
        <label>Monthly Request Limit (0 = unlimited)</label>
        <input type="number" id="limit-val" value="500" min="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('limit-modal')">Cancel</button>
      <button class="btn primary" id="limit-btn" onclick="doSetLimit()">Save Limit</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════ -->
<!-- SUSPEND MODAL                               -->
<!-- ══════════════════════════════════════════ -->
<div class="modal-bg" id="suspend-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('suspend-modal')">✕</button>
    <div class="modal-title">Suspend Salon</div>
    <div class="modal-fields">
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;" id="suspend-salon-name"></div>
      <div class="field">
        <label>Reason (optional)</label>
        <input type="text" id="suspend-reason" placeholder="e.g. Payment overdue">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('suspend-modal')">Cancel</button>
      <button class="btn danger" onclick="doSuspend()">Suspend Account</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://elmo-hairstyler-worker.acedynamicstrading.workers.dev';

let sessionToken = localStorage.getItem('elume_admin_token') || null;
let adminKey     = localStorage.getItem('elume_admin_key')   || null;
let allSalons    = [];
let currentFilter = 'all';
let limitTargetEmail    = null;
let suspendTargetEmail  = null;

// ── HASH ─────────────────────────────────────────────────────────
async function sha256(str) {
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg, type = 'green') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ── LOGIN ─────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');

  if (!email || !pass) { showErr(err, 'Please enter email and password.'); return; }

  btn.classList.add('loading'); btn.disabled = true; err.style.display = 'none';

  try {
    const hash = await sha256(pass);
    const res  = await fetch(WORKER, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({ action:'salonLogin', email, passwordHash: hash }),
    });
    const data = await res.json();

    if (!data.success) {
      showErr(err, data.error || 'Login failed.');
      return;
    }

    // Check admin role
    if (data.salon?.role !== 'admin') {
      showErr(err, 'This account does not have admin access.');
      return;
    }

    sessionToken = data.token;
    adminKey     = document.getElementById('login-pass').value; // keep raw for hashing later... 
    // Actually store ADMIN_KEY separately — prompt for it
    localStorage.setItem('elume_admin_token', sessionToken);

    // We need the ADMIN_KEY secret for admin actions — ask for it
    const ak = prompt('Enter your ADMIN_KEY (from Cloudflare secrets):');
    if (!ak) { showErr(err, 'ADMIN_KEY required for admin actions.'); return; }
    adminKey = ak;
    localStorage.setItem('elume_admin_key', ak);

    document.getElementById('topbar-user').textContent = data.salon.ownerName + ' · ' + data.salon.salonName;
    showDashboard();

  } catch(e) {
    showErr(err, 'Connection error. Please try again.');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

// ── LOGOUT ────────────────────────────────────────────────────────
async function doLogout() {
  if (sessionToken) {
    fetch(WORKER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'salonLogout', token: sessionToken }),
    }).catch(()=>{});
  }
  localStorage.removeItem('elume_admin_token');
  localStorage.removeItem('elume_admin_key');
  sessionToken = null; adminKey = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

// ── SHOW DASHBOARD ────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('login-page').style.display  = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  loadStats();
  loadSalons();
}

// ── STATS ─────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${WORKER}?action=adminStats&adminKey=${encodeURIComponent(adminKey)}`);
    const data = await res.json();
    if (!data.success) return;
    document.getElementById('stat-total').textContent     = data.totalSalons;
    document.getElementById('stat-active').textContent    = data.activeSalons;
    document.getElementById('stat-pending').textContent   = data.pendingSalons;
    document.getElementById('stat-suspended').textContent = data.suspendedSalons;
    document.getElementById('stat-usage').textContent     = data.usageThisMonth.toLocaleString();
  } catch {}
}

// ── LOAD SALONS ───────────────────────────────────────────────────
async function loadSalons() {
  const tbody = document.getElementById('salon-tbody');
  tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted);font-size:0.75rem;">Loading…</td></tr>';

  try {
    const res  = await fetch(WORKER, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({ action:'adminListSalons', adminKey }),
    });
    const data = await res.json();
    if (!data.success) { toast(data.error || 'Failed to load salons.', 'red'); return; }
    allSalons = data.salons || [];
    renderTable();
    loadStats();
  } catch(e) {
    tbody.innerHTML = '';
    toast('Connection error.', 'red');
  }
}

// ── RENDER TABLE ──────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('salon-tbody');
  const empty = document.getElementById('salon-empty');
  const filtered = currentFilter === 'all'
    ? allSalons
    : allSalons.filter(s => s.status === currentFilter);

  tbody.innerHTML = '';

  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach(s => {
    const limit   = s.monthlyLimit === 0 ? '∞' : s.monthlyLimit;
    const usage   = s.usageThisMonth || 0;
    const pct     = s.monthlyLimit === 0 ? 0 : Math.min(100, Math.round(usage / s.monthlyLimit * 100));
    const barColor = pct > 85 ? 'var(--red)' : pct > 60 ? 'var(--amber)' : 'var(--gold)';
    const lastLogin = s.lastLoginAt ? new Date(s.lastLoginAt).toLocaleDateString('en-GB') : '—';
    const isAdmin = s.role === 'admin';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="name">${esc(s.salonName)}${isAdmin ? ' <span style="font-size:0.55rem;color:var(--gold);letter-spacing:0.1em;">ADMIN</span>' : ''}</td>
      <td>${esc(s.ownerName)}</td>
      <td style="font-size:0.72rem;color:var(--muted)">${esc(s.email)}</td>
      <td>${esc(s.city || '—')}</td>
      <td><span class="badge ${s.status}">${s.status}</span></td>
      <td>
        <div class="usage-bar-wrap">
          <div class="usage-bar-outer"><div class="usage-bar-inner" style="width:${pct}%;background:${barColor}"></div></div>
          <div class="usage-label">${usage} / ${limit}</div>
        </div>
      </td>
      <td style="font-size:0.72rem">${lastLogin}</td>
      <td>
        <div class="td-actions">
          ${s.status === 'pending'   ? `<button class="btn success" onclick="approveSalon('${esc(s.email)}')">Approve</button>` : ''}
          ${s.status === 'active' && !isAdmin ? `<button class="btn danger" onclick="openSuspendModal('${esc(s.email)}','${esc(s.salonName)}')">Suspend</button>` : ''}
          ${s.status === 'suspended' ? `<button class="btn success" onclick="approveSalon('${esc(s.email)}')">Reinstate</button>` : ''}
          <button class="btn" onclick="openLimitModal('${esc(s.email)}','${esc(s.salonName)}',${s.monthlyLimit})">Limit</button>
          ${!isAdmin ? `<button class="btn danger" onclick="deleteSalon('${esc(s.email)}','${esc(s.salonName)}')">Delete</button>` : ''}
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

// ── APPROVE ───────────────────────────────────────────────────────
async function approveSalon(email) {
  try {
    const res  = await fetch(WORKER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'adminApproveSalon', adminKey, email }),
    });
    const data = await res.json();
    if (data.success) { toast('Salon approved ✓', 'green'); loadSalons(); }
    else toast(data.error || 'Failed.', 'red');
  } catch { toast('Connection error.', 'red'); }
}

// ── SUSPEND MODAL ─────────────────────────────────────────────────
function openSuspendModal(email, name) {
  suspendTargetEmail = email;
  document.getElementById('suspend-salon-name').textContent = name;
  document.getElementById('suspend-reason').value = '';
  document.getElementById('suspend-modal').classList.add('open');
}

async function doSuspend() {
  const reason = document.getElementById('suspend-reason').value.trim();
  try {
    const res  = await fetch(WORKER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'adminSuspendSalon', adminKey, email: suspendTargetEmail, reason }),
    });
    const data = await res.json();
    if (data.success) { toast('Salon suspended.', 'green'); closeModal('suspend-modal'); loadSalons(); }
    else toast(data.error || 'Failed.', 'red');
  } catch { toast('Connection error.', 'red'); }
}

// ── DELETE ────────────────────────────────────────────────────────
async function deleteSalon(email, name) {
  if (!confirm(`Permanently delete "${name}"?\n\nThis cannot be undone.`)) return;
  try {
    const res  = await fetch(WORKER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'adminDeleteSalon', adminKey, email }),
    });
    const data = await res.json();
    if (data.success) { toast('Salon deleted.', 'green'); loadSalons(); }
    else toast(data.error || 'Failed.', 'red');
  } catch { toast('Connection error.', 'red'); }
}

// ── LIMIT MODAL ───────────────────────────────────────────────────
function openLimitModal(email, name, currentLimit) {
  limitTargetEmail = email;
  document.getElementById('limit-salon-name').textContent = name;
  document.getElementById('limit-val').value = currentLimit;
  document.getElementById('limit-err').style.display = 'none';
  document.getElementById('limit-modal').classList.add('open');
}

async function doSetLimit() {
  const val = parseInt(document.getElementById('limit-val').value);
  if (isNaN(val) || val < 0) { showErr(document.getElementById('limit-err'), 'Enter a valid number (0 = unlimited).'); return; }
  try {
    const res  = await fetch(WORKER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'adminSetLimit', adminKey, email: limitTargetEmail, monthlyLimit: val }),
    });
    const data = await res.json();
    if (data.success) { toast(data.message, 'green'); closeModal('limit-modal'); loadSalons(); }
    else showErr(document.getElementById('limit-err'), data.error || 'Failed.');
  } catch { showErr(document.getElementById('limit-err'), 'Connection error.'); }
}

// ── CREATE SALON MODAL ────────────────────────────────────────────
function openCreateModal() {
  ['c-name','c-owner','c-email','c-phone','c-city','c-pass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c-limit').value  = '500';
  document.getElementById('c-status').value = 'true';
  document.getElementById('create-err').style.display = 'none';
  document.getElementById('create-ok').style.display  = 'none';
  document.getElementById('create-modal').classList.add('open');
}

async function doCreateSalon() {
  const name    = document.getElementById('c-name').value.trim();
  const owner   = document.getElementById('c-owner').value.trim();
  const email   = document.getElementById('c-email').value.trim();
  const phone   = document.getElementById('c-phone').value.trim();
  const city    = document.getElementById('c-city').value.trim();
  const pass    = document.getElementById('c-pass').value;
  const limit   = parseInt(document.getElementById('c-limit').value) || 500;
  const approved = document.getElementById('c-status').value === 'true';

  const errEl = document.getElementById('create-err');
  const okEl  = document.getElementById('create-ok');

  if (!name || !owner || !email || !pass) {
    showErr(errEl, 'Salon name, owner, email and password are required.'); return;
  }

  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  errEl.style.display = 'none'; okEl.style.display = 'none';

  try {
    const hash = await sha256(pass);
    const res  = await fetch(WORKER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action: 'adminCreateSalon', adminKey,
        email, passwordHash: hash, salonName: name,
        ownerName: owner, phone, city,
        approved, monthlyLimit: limit,
      }),
    });
    const data = await res.json();
    if (data.success) {
      okEl.textContent = data.message;
      okEl.style.display = 'block';
      toast(data.message, 'green');
      loadSalons();
      setTimeout(() => closeModal('create-modal'), 1800);
    } else {
      showErr(errEl, data.error || 'Failed to create salon.');
    }
  } catch { showErr(errEl, 'Connection error.'); }
  finally { btn.disabled = false; btn.textContent = 'Create Salon'; }
}

// ── MODAL HELPERS ─────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open');    }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modal on backdrop click
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
});

// ── AUTO LOGIN IF TOKEN EXISTS ────────────────────────────────────
window.addEventListener('load', async () => {
  if (sessionToken && adminKey) {
    // Verify session is still valid
    try {
      const res  = await fetch(`${WORKER}?action=salonMe&token=${sessionToken}`);
      const data = await res.json();
      if (data.success && data.salon?.role === 'admin') {
        document.getElementById('topbar-user').textContent =
          data.salon.ownerName + ' · ' + data.salon.salonName;
        showDashboard();
        return;
      }
    } catch {}
    // Session expired — clear and show login
    localStorage.removeItem('elume_admin_token');
    localStorage.removeItem('elume_admin_key');
    sessionToken = null; adminKey = null;
  }
  document.getElementById('login-page').style.display  = 'flex';
  document.getElementById('dashboard').style.display   = 'none';
});
</script>
</body>
